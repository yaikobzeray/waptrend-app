plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id("com.google.devtools.ksp") version "2.1.0-1.0.29" // Use the latest version
}
// def keystoreProperties = new Properties()
// def keystorePropertiesFile = rootProject.file("key.properties")
// if (keystorePropertiesFile.exists()) {
//     keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
// }


def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}


def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}



android {
    namespace "com.waptrend.app"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.waptrend.app"
        minSdkVersion 24
        targetSdkVersion 34
        compileSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        ndk { abiFilters 'x86', 'x86_64', 'armeabi-v7a', 'arm64-v8a' }

        android {
            ndkVersion "26.1.10909125"
        }
    }
    signingConfigs {
        debug {
          
        // keyAlias keystoreProperties['keyAlias']
        // keyPassword keystoreProperties['keyPassword']
        // storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
        // storePassword keystoreProperties['storePassword']

            // v1SigningEnabled true
            // v2SigningEnabled true

            // Add debug keystore credentials here
        }

    //    release {
    //        keyAlias keystoreProperties['keyAlias']
    //        keyPassword keystoreProperties['keyPassword']
    //        storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
    //        storePassword keystoreProperties['storePassword']
    //        // v1SigningEnabled true
    //        // v2SigningEnabled true
    //    }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            ndk {
                abiFilters 'armeabi-v7a','arm64-v8a','x86_64'
            }
        }
        debug {
        signingConfig signingConfigs.debug
    }
    }
    androidResources {
        noCompress 'tflite'
    }

}

flutter {
    source '../..'
}

dependencies {
    implementation 'com.google.firebase:firebase-messaging:24.1.0'
    implementation 'androidx.annotation:annotation:1.9.1'
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.gms:play-services-ads:24.0.0'
//    ksp 'com.google.devtools.ksp:symbol-processing-api:2.1.0-1.0.29'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}

